# Home Assistant — the unified home control panel (alarm view/arm, thermostat,
# air quality, solar, lights, shades). Hubitat (192.168.50.11) stays the Z-Wave
# radio hub + local alarm engine (HSM); HA pulls its devices in over the LAN via
# the Hubitat Maker API, so day-to-day everything lives in HA, not Hubitat.
#
# Runs as HA *Container* (no Supervisor/add-ons) — fine here because the radios
# live on Hubitat, so HA needs no USB passthrough, just network access.
apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ha-config
  namespace: home-assistant
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path        # node-local SSD: HA's SQLite recorder is write-heavy
  resources:                          # and unreliable on NFS. HA is a singleton, so pinning is ok.
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ha-seed
  namespace: home-assistant
data:
  # Seeded into /config ONLY if no configuration.yaml exists yet (first boot).
  # trusted_proxies must include the ingress-nginx pod network or HA 400s behind the proxy.
  configuration.yaml: |
    default_config:

    homeassistant:
      packages: !include_dir_named packages   # git-managed config (alarm panel, etc.)

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.244.0.0/16   # Cilium pod CIDR (ingress-nginx controller)
        - 127.0.0.1

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml
---
# Git-managed HA config, loaded as a "package". The Hubitat Safety Monitor alarm
# surfaces as an alarm_control_panel: state read from the integration's
# sensor.hub_hsm_status; arm/disarm POST to the Maker API HSM endpoints. The URLs
# (which embed the access token) live in the out-of-band ha-secrets Secret, so
# nothing sensitive is in git.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ha-packages
  namespace: home-assistant
data:
  alarm.yaml: |
    # Latch for the triggered state (HSM's intrusion alert isn't exposed via Maker
    # API, so HA does the detect->latch->notify itself; HSM stays arm/disarm truth).
    input_boolean:
      alarm_triggered:
        name: Alarm Triggered
        icon: mdi:alarm-light

    rest_command:
      hsm_arm_away: { url: !secret hsm_url_arm_away, method: GET }
      hsm_arm_home: { url: !secret hsm_url_arm_home, method: GET }
      hsm_arm_night: { url: !secret hsm_url_arm_night, method: GET }
      hsm_disarm:   { url: !secret hsm_url_disarm,   method: GET }
      ntfy_alarm:
        url: !secret ntfy_alarm_url
        method: POST
        content_type: "text/plain"
        headers:
          Authorization: !secret ntfy_auth_header
          Title: "Home Alarm"
          Priority: "urgent"
          Tags: "rotating_light,house"
        payload: "{{ message }}"

    template:
      - alarm_control_panel:
          - name: House Alarm
            unique_id: house_alarm_hsm
            state: >
              {% if is_state('input_boolean.alarm_triggered', 'on') %} triggered
              {% else %}
                {% set s = states('sensor.hub_hsm_status') | lower | replace(' ', '') | replace('_', '') %}
                {% if s == 'armedaway' %} armed_away
                {% elif s == 'armedhome' %} armed_home
                {% elif s == 'armednight' %} armed_night
                {% elif 'arming' in s %} arming
                {% else %} disarmed {% endif %}
              {% endif %}
            code_arm_required: false
            arm_away:  [{ action: rest_command.hsm_arm_away }]
            arm_home:  [{ action: rest_command.hsm_arm_home }]
            arm_night: [{ action: rest_command.hsm_arm_night }]
            disarm:    [{ action: rest_command.hsm_disarm }]

    automation:
      # Intrusion: a monitored sensor opens while armed, past the exit grace, and
      # still armed after the entry delay -> latch triggered + push to ntfy.
      - alias: Alarm - intrusion (front door)
        id: alarm_intrusion_front_door
        mode: restart
        trigger:
          # Trip on the door opening...
          - platform: state
            entity_id: binary_sensor.foyer_front_door_contact
            to: "on"
          # ...OR if the door is still open when the exit grace ends (can't defeat
          # it by propping the door during the leave window).
          - platform: state
            entity_id: sensor.hub_hsm_status
            to: "armedAway"
            for: "00:00:20"
        condition:
          - condition: state
            entity_id: binary_sensor.foyer_front_door_contact
            to: "on"
          - condition: template
            value_template: "{{ states('sensor.hub_hsm_status') | lower | replace(' ','') | replace('_','') in ['armedaway','armedhome','armednight'] }}"
          - condition: template
            value_template: "{{ (now() - states.sensor.hub_hsm_status.last_changed).total_seconds() > 20 }}"
        action:
          - delay: "00:00:20"     # entry delay: time to disarm before it actually alarms
          - condition: template
            value_template: "{{ states('sensor.hub_hsm_status') | lower | replace(' ','') | replace('_','') in ['armedaway','armedhome','armednight'] }}"
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.alarm_triggered }
          - action: rest_command.ntfy_alarm
            data: { message: "INTRUSION: Front Door opened while armed." }

      # Clear the latch whenever HSM goes disarmed.
      - alias: Alarm - clear on disarm
        id: alarm_clear_on_disarm
        trigger:
          - platform: state
            entity_id: sensor.hub_hsm_status
        condition:
          - condition: template
            value_template: "{{ states('sensor.hub_hsm_status') | lower | replace(' ','') | replace('_','') in ['disarmed','alldisarmed'] }}"
        action:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.alarm_triggered }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels: { app: home-assistant }
spec:
  replicas: 1
  strategy: { type: Recreate }        # single SQLite writer on the RWO volume
  selector: { matchLabels: { app: home-assistant } }
  template:
    metadata: { labels: { app: home-assistant } }
    spec:
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ ! -f /config/configuration.yaml ]; then
                echo "seeding fresh HA config"
                cp /seed/configuration.yaml /config/configuration.yaml
                : > /config/automations.yaml
                : > /config/scripts.yaml
                : > /config/scenes.yaml
              else
                echo "existing config present — leaving it alone"
              fi
              # Idempotently load git-managed packages on the pre-existing config too.
              if ! grep -q 'include_dir_named packages' /config/configuration.yaml; then
                printf '\nhomeassistant:\n  packages: !include_dir_named packages\n' >> /config/configuration.yaml
              fi
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: seed, mountPath: /seed }
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2026.6.4
          env:
            - { name: TZ, value: "US/Central" }
          ports: [{ containerPort: 8123, name: http }]
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: packages, mountPath: /config/packages, readOnly: true }   # git-managed HA config
            - { name: secrets, mountPath: /config/secrets.yaml, subPath: secrets.yaml, readOnly: true }
          startupProbe:                # HA can take a while on first boot (image is large, DB init)
            httpGet: { path: /manifest.json, port: http }
            periodSeconds: 10
            failureThreshold: 60       # up to 10 min
          livenessProbe:
            httpGet: { path: /manifest.json, port: http }
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests: { cpu: "100m", memory: 512Mi }
            limits:   { memory: 2Gi }
      volumes:
        - { name: config, persistentVolumeClaim: { claimName: ha-config } }
        - { name: seed, configMap: { name: ha-seed } }
        - { name: packages, configMap: { name: ha-packages } }
        - { name: secrets, secret: { secretName: ha-secrets } }   # HSM URLs+token, out-of-band (not in git)
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  selector: { app: home-assistant }
  ports: [{ port: 8123, targetPort: http, name: http }]
---
# Dedicated LAN IP (Cilium BGP LoadBalancer) so the Hubitat hub can POST device
# events directly to HA on the local network — no hairpin through the public ingress.
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-lan
  namespace: home-assistant
  labels: { app: home-assistant }
  annotations:
    lbipam.cilium.io/ips: "192.168.60.10"   # pinned clean IP (avoid the .0 network address)
spec:
  type: LoadBalancer
  selector: { app: home-assistant }
  ports:
    - { port: 8123, targetPort: 8123, name: http }
    - { port: 8124, targetPort: 8124, name: hubitat-events }  # hacs-hubitat event listener

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # HA uses long-lived websockets
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["home.thereedfamily.rocks"]
      secretName: home-assistant-tls
  rules:
    - host: home.thereedfamily.rocks
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-assistant
                port: { name: http }
