# VictoriaMetrics k8s stack — multi-source Argo app.
# Chart pulled from the VM helm repo; values come from the git-tracked values.yaml
# in THIS repo via a $values ref (so the full config is version-controlled instead of
# living as an imperative inline valuesObject on the Application).
# Apply with: kubectl apply -f victoria-metrics.application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - repoURL: https://victoriametrics.github.io/helm-charts/
      chart: victoria-metrics-k8s-stack
      targetRevision: 0.85.6
      helm:
        valueFiles:
          - $values/cluster/victoria-metrics/values.yaml
    - repoURL: https://github.com/reedjosh/mediaserver-charts
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
