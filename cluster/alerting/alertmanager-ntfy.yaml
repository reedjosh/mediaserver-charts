# alertmanager-ntfy: turns Alertmanager webhooks into nicely-formatted ntfy pushes.
# Alertmanager POSTs to http://alertmanager-ntfy.monitoring.svc:8000/hook
# The ntfy token lives in a SEPARATE out-of-band Secret `alertmanager-ntfy-auth`
# (auth.yml), NOT committed. Create it with:
#   kubectl -n monitoring create secret generic alertmanager-ntfy-auth \
#     --from-literal=auth.yml='ntfy:
#       auth:
#         token: tk_xxx'
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-ntfy-config
  namespace: monitoring
data:
  config.yml: |
    http:
      addr: :8000
    ntfy:
      baseurl: http://ntfy.monitoring.svc.cluster.local
      notification:
        topic: homelab-alerts
        priority: |
          status == "firing" ? "high" : "default"
        tags:
          - tag: rotating_light
            condition: status == "firing"
          - tag: white_check_mark
            condition: status == "resolved"
        templates:
          title: |
            {{ if eq .Status "resolved" }}Resolved: {{ end }}{{ index .Labels "alertname" }}
          description: |
            {{ with index .Annotations "description" }}{{ . }}{{ else }}{{ index .Annotations "summary" }}{{ end }}
            severity={{ index .Labels "severity" }} {{ with index .Labels "instance" }}instance={{ . }} {{ end }}{{ with index .Labels "node" }}node={{ . }} {{ end }}{{ with index .Labels "pod" }}pod={{ . }}{{ end }}
        async: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-ntfy
  namespace: monitoring
  labels: { app: alertmanager-ntfy }
spec:
  replicas: 1
  selector: { matchLabels: { app: alertmanager-ntfy } }
  template:
    metadata: { labels: { app: alertmanager-ntfy } }
    spec:
      containers:
        - name: alertmanager-ntfy
          image: ghcr.io/alexbakker/alertmanager-ntfy:latest
          args: ["--configs", "/etc/anr/config.yml,/etc/anr/auth.yml"]
          ports: [{ containerPort: 8000, name: http }]
          volumeMounts:
            - { name: config, mountPath: /etc/anr/config.yml, subPath: config.yml }
            - { name: auth, mountPath: /etc/anr/auth.yml, subPath: auth.yml }
          resources:
            requests: { cpu: "10m", memory: 16Mi }
            limits:   { memory: 64Mi }
      volumes:
        - { name: config, configMap: { name: alertmanager-ntfy-config } }
        - { name: auth, secret: { secretName: alertmanager-ntfy-auth } }
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-ntfy
  namespace: monitoring
spec:
  selector: { app: alertmanager-ntfy }
  ports: [{ port: 8000, targetPort: http, name: http }]
