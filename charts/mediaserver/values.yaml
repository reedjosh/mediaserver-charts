# Shared storage owned by this umbrella chart.
storage:
  create: true
  className: nfs-kubedata
  configClaim: mediaserver-config
  configSize: 50Gi
  dataClaim: mediaserver-data
  dataSize: 4Ti          # advisory only (nfs-subdir provisioner ignores it)

# Each app is its own subchart; flip enabled to deploy/remove it.
# App-level defaults (images, ports, ingress hosts) live in each subchart's
# values.yaml and already match the cluster - override here only as needed.
jellyfin:
  enabled: true
radarr:
  enabled: true
sonarr:
  enabled: true
prowlarr:
  enabled: true
transmission:
  enabled: true
  # vpn keys are NOT set here - create the transmission-vpn Secret out of band.

# Scheduled library re-encoder. Off by default - it rewrites media files in
# place (parking originals in a trash dir). Enable once you're ready, ideally
# after the GPU is in (set reencoder.gpu.enabled there too).
reencoder:
  enabled: true

# Queue janitor: removes dead/stalled downloads and triggers a re-grab.
# Needs the decluttarr-secrets Secret (RADARR_API_KEY + SONARR_API_KEY).
decluttarr:
  enabled: true
