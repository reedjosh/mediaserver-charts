# Scheduled library re-encoder.
# Runs on a cron schedule, finds oversized legacy (x264/etc) files and
# re-encodes them to HEVC (or AV1) to reclaim space. Idempotent: already-HEVC/AV1
# files are skipped, so each run chews through the remaining backlog.

schedule: "0 2 * * *"        # nightly at 02:00
concurrencyPolicy: Forbid    # never overlap runs
node: jayrdl3803             # pin to the storage node (local reads/writes)

job:
  backoffLimit: 100          # retry a run many times so it survives node reboots
                             # (idempotent script resumes; raise further if needed)

image:
  # CPU-only ffmpeg today. For NVENC later, swap to an ffmpeg image built with
  # nvenc support and set gpu.enabled=true (see below).
  repository: lscr.io/linuxserver/ffmpeg
  tag: latest
  pullPolicy: IfNotPresent

storage:
  dataClaim: mediaserver-data
  mediaPath: /data/media        # where the library lives inside the volume
  trashDir: /data/.reencode-trash  # originals parked here for review
  trashKeepDays: "7"            # auto-purge trashed originals older than this each run

puid: 1000
pgid: 1000

encode:
  codec: hevc           # hevc | av1. HEVC: direct-plays on the Shield (Tegra X1 has NO AV1 decode)
                        # and most clients; AV1's compression edge isn't worth the transcode hit.
  crf: "20"             # x265 ~20-22 (lower = higher quality/larger)
  preset: slow          # x265 preset (medium/slow); av1 path would use a number
  pixfmt: yuv420p10le   # 10-bit even from 8-bit source (better compression, less banding)
  maxratePct: "100"     # cap output bitrate at this % of the SOURCE bitrate so a re-encode
                        # can never exceed the original (HEVC at <= source kbps is >= its quality).
  keepMaxPct: "90"      # only keep the re-encode if it's < this % of the original size; otherwise
                        # discard it, keep the original, and tombstone the file (never re-try).

select:
  maxFiles: "20"        # cap files per run so a night's work is bounded
  minSizeMb: "0"        # no size floor - re-encode x264 of any size
  skipHdr: "1"          # KEEP: naive re-encode strips HDR10/loses Dolby Vision
  skip4k: "0"           # process 4K too (stays 4K, just re-encoded to HEVC)

# GPU hardware encode (off until the card arrives). When enabled, the script
# uses hevc_nvenc/av1_nvenc and requests the GPU resource below.
gpu:
  enabled: false
  vendor: nvidia                 # nvidia | intel
  resourceName: nvidia.com/gpu   # or gpu.intel.com/i915 for Arc
  runtimeClassName: ""           # e.g. "nvidia" if your node uses a runtime class

resources:
  requests: { cpu: "2", memory: 2Gi }    # low request -> yields to Jellyfin under contention
  limits:   { cpu: "54", memory: 16Gi }  # burst x265 up to 54 threads (3/4 of the 72 on .227)
