image:
  repository: docker.io/linuxserver/radarr
  tag: latest
  pullPolicy: Always

port: 7878
puid: 1000
pgid: 1000
tz: America/Denver

# Shared NFS storage. radarr needs the data volume (single /data mount) so it
# can hardlink imports from /data/torrents into /data/media/movies.
storage:
  configClaim: mediaserver-config
  dataClaim: mediaserver-data
  mountData: true

service:
  type: ClusterIP
  port: 7878

probe:
  path: /radarr/ping

# Seed config.xml with the UrlBase so radarr serves under /radarr.
initConfig:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: media.thereedfamily.rocks
  path: /radarr
  tls:
    enabled: true
    secretName: radarr-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

nodeSelector: {}
resources: {}
