image:
  repository: docker.io/linuxserver/prowlarr
  tag: latest
  pullPolicy: Always

port: 9696
puid: 1000
pgid: 1000
tz: America/Denver

# prowlarr is an indexer manager only - no media, so no data volume.
storage:
  configClaim: mediaserver-config
  dataClaim: mediaserver-data
  mountData: false

service:
  type: ClusterIP
  port: 9696

probe:
  path: /prowlarr/ping

initConfig:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: media.thereedfamily.rocks
  path: /prowlarr
  tls:
    enabled: true
    secretName: prowlarr-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

nodeSelector: {}
resources: {}
