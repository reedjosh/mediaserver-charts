apiVersion: apps/v1
kind: Deployment
metadata:
  name: decluttarr
  labels:
    app.kubernetes.io/name: decluttarr
    app.kubernetes.io/part-of: mediaserver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: decluttarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: decluttarr
      annotations:
        # roll the pod when the config changes
        checksum/config: {{ .Values.config | toYaml | sha256sum }}
    spec:
      initContainers:
        # render the real config from the template, injecting API keys from the
        # Secret (so keys never live in git / the ConfigMap)
        - name: inject-keys
          image: docker.io/busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /cm/config.yaml /app/config/config.yaml
              sed -i "s|RADARR_API_KEY_PLACEHOLDER|$RADARR_API_KEY|" /app/config/config.yaml
              sed -i "s|SONARR_API_KEY_PLACEHOLDER|$SONARR_API_KEY|" /app/config/config.yaml
          env:
            - name: RADARR_API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.existingSecret }}, key: RADARR_API_KEY } }
            - name: SONARR_API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.existingSecret }}, key: SONARR_API_KEY } }
          volumeMounts:
            - { name: cm, mountPath: /cm }
            - { name: config, mountPath: /app/config }
      containers:
        - name: decluttarr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - { name: config, mountPath: /app/config }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
      volumes:
        - name: cm
          configMap:
            name: decluttarr-config
        - name: config
          emptyDir: {}
